name: CI

# Build/test gate for the embedded writing tools. These render inside iframes
# on becomeawritertoday.com ranking pages, so a broken build ships a white box
# to the site's biggest-traffic pages — every PR must build and pass tests.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
