name: Newsletter send

# Sends the next scheduled personal letter (Become a Writer Today).
#
# Schedule: Mon / Wed / Fri 07:00 Europe/London.
# GitHub cron is UTC and has no DST. 06:00 UTC = 07:00 BST (summer) / 06:00 GMT
# (winter). We accept the one-hour winter drift rather than double-fire.
#
# LIVE SEND IS GATED. It runs a dry preview unless the repo variable
# NEWSLETTER_LIVE == 'true' (or a manual run picks mode: live). Even when
# "live", send.js still falls back to a dry run if RESEND_API_KEY is unset.
#
# Manual trigger (one command):
#   gh workflow run newsletter.yml                 # dry preview
#   gh workflow run newsletter.yml -f mode=live    # force a live send attempt

on:
  schedule:
    - cron: "0 6 * * 1,3,5"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry (preview only) or live (attempt a real send)"
        type: choice
        default: dry
        options: [dry, live]
        required: true

concurrency:
  group: newsletter-send
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install send-engine deps
        working-directory: deadline-digest
        run: npm install --no-audit --no-fund

      - name: Decide dry vs live
        id: mode
        run: |
          LIVE="false"
          if [ "${{ vars.NEWSLETTER_LIVE }}" = "true" ]; then LIVE="true"; fi
          if [ "${{ github.event.inputs.mode }}" = "live" ]; then LIVE="true"; fi
          echo "live=$LIVE" >> "$GITHUB_OUTPUT"
          echo "Resolved mode: live=$LIVE"

      - name: Send newsletter
        working-directory: deadline-digest
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SITE_URL: ${{ vars.SITE_URL }}
          RESEND_BASE_SEGMENT_ID: ${{ vars.RESEND_BASE_SEGMENT_ID }}
          RESEND_TOPIC_FICTION: ${{ vars.RESEND_TOPIC_FICTION }}
          RESEND_TOPIC_POETRY: ${{ vars.RESEND_TOPIC_POETRY }}
          RESEND_TOPIC_NONFICTION: ${{ vars.RESEND_TOPIC_NONFICTION }}
        run: |
          if [ "${{ steps.mode.outputs.live }}" = "true" ]; then
            echo "LIVE send attempt (falls back to dry if RESEND_API_KEY unset)"
            node send.js
          else
            echo "DRY run (default). No email will be sent."
            node send.js --dry
          fi

      - name: Upload previews (dry runs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-previews
          path: deadline-digest/preview-*
          if-no-files-found: ignore
