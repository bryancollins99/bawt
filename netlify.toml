[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Standalone tools (static files in public/)
[[redirects]]
  from = "/plan"
  to = "/book-deadline-planner.html"
  status = 200

[[redirects]]
  from = "/contests"
  to = "/writing-contests.html"
  status = 200

